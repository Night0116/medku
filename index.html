<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Souls, One Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        #hint-text {
            position: absolute;
            bottom: 10%;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: opacity 1s ease;
        }

        #final-text {
            text-align: center;
            color: #fff;
        }

        #final-text p {
            margin: 15px 0;
            opacity: 0;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        .fade-in-1 { animation: fadeIn 2s forwards 0.5s; font-size: 16px; color: #aaa; }
        .fade-in-2 { animation: fadeIn 2s forwards 2.0s; font-size: 24px; font-style: italic; text-shadow: 0 0 15px rgba(255, 105, 180, 0.8); }
        .fade-in-3 { animation: fadeIn 2s forwards 4.0s; font-size: 12px; color: #666; letter-spacing: 5px; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui-container">
        <h1 id="hint-text">DRAG THE SOULS TOGETHER</h1>
        <div id="final-text" class="hidden">
            <p class="fade-in-1">IN 7 BILLION PEOPLE...</p>
            <p class="fade-in-2">"..you found me."</p>
            <p class="fade-in-3">SOME THINGS ARE WRITTEN IN THE STARS</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });

        // "ScreenRecording_07-06-2026 22-00-14_1.mp4" бичлэг дээрх зүрх үүсгэх математик код
        const HEART_RES = 256;
        const hpx = new Float32Array(HEART_RES);
        const hpy = new Float32Array(HEART_RES);

        function buildHeartPts() {
            for (let i = 0; i < HEART_RES; i++) {
                const t = (i / HEART_RES) * Math.PI * 2;
                hpx[i] = 16 * Math.pow(Math.sin(t), 3);
                hpy[i] = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            }
        }
        buildHeartPts();

        function computeHeartScale(now) {
            const base = (Math.min(w, h) * 0.35) / 32;
            const cycle = (now * 0.0012) % 1;
            let pulse = 0;
            if (cycle < 0.12) pulse = Math.sin((cycle / 0.12) * Math.PI);
            else if (cycle < 0.18) pulse = 0.6 * Math.sin(((cycle - 0.12) / 0.06) * Math.PI);
            return base * (1 + pulse * 0.15);
        }

        const soulA = { x: w * 0.5, y: h * 0.3, radius: 40, label: "YOU", color: "rgba(173, 216, 230, 0.8)", glow: "#aae7ff" };
        const soulB = { x: w * 0.5, y: h * 0.7, radius: 40, label: "ME", color: "rgba(255, 182, 193, 0.8)", glow: "#ffb6c1" };

        let draggedSoul = null;
        let isMerged = false;

        const stars = Array.from({ length: 80 }, () => ({
            x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5
        }));

        function drawStars() {
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawSoul(soul) {
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = soul.glow;
            
            let grad = ctx.createRadialGradient(soul.x, soul.y, 0, soul.x, soul.y, soul.radius);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.3, soul.color);
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(soul.x, soul.y, soul.radius * 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10;
            ctx.fillText(soul.label, soul.x, soul.y - soul.radius - 10);
            ctx.restore();
        }

        function loop(now) {
            ctx.clearRect(0, 0, w, h);
            drawStars();

            if (!isMerged) {
                const dist = Math.hypot(soulA.x - soulB.x, soulA.y - soulB.y);
                if (dist < 60) {
                    isMerged = true;
                    document.getElementById('hint-text').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('final-text').classList.remove('hidden');
                    }, 500);
                }
                drawSoul(soulA);
                drawSoul(soulB);
            } else {
                const scale = computeHeartScale(now);
                const cx = w / 2;
                const cy = h / 2 - 20;

                ctx.save();
                ctx.shadowBlur = 40;
                ctx.shadowColor = "rgba(255, 105, 180, 0.9)";
                
                ctx.beginPath();
                for (let i = 0; i < HEART_RES; i++) {
                    const x = cx + hpx[i] * scale;
                    const y = cy + hpy[i] * scale;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                
                let heartGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, scale * 20);
                heartGrad.addColorStop(0, 'rgba(255, 200, 220, 0.4)');
                heartGrad.addColorStop(0.8, 'rgba(230, 80, 150, 0.1)');
                heartGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = heartGrad;
                ctx.fill();

                ctx.strokeStyle = "rgba(255, 230, 240, 0.9)";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }

            requestAnimationFrame(loop);
        }

        function getPos(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        function handleStart(e) {
            if (isMerged) return;
            const pos = getPos(e);
            if (Math.hypot(soulA.x - Math.max(0, pos.x), soulA.y - pos.y) < soulA.radius * 1.5) draggedSoul = soulA;
            else if (Math.hypot(soulB.x - pos.x, soulB.y - pos.y) < soulB.radius * 1.5) draggedSoul = soulB;
        }

        function handleMove(e) {
            if (!draggedSoul || isMerged) return;
            const pos = getPos(e);
            draggedSoul.x = pos.x;
            draggedSoul.y = pos.y;
        }

        function handleEnd() { draggedSoul = null; }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchend', handleEnd);

        requestAnimationFrame(loop);
    </script>
</body>
</html>
